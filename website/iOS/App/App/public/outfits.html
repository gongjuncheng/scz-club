<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>孙老师穿搭 · 孙春志后援会</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/tus-js-client@3.1.3/dist/tus.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <script src="common.js"></script>
  <style>
    body { background: #0b0710; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); border: 1px solid rgba(255,200,240,0.15); }
    .gradient-bg { background: linear-gradient(135deg, #d43f8d, #6a1b4d); }
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(20,10,30,0.7); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); padding: 10px 24px; display: flex; justify-content: space-around; z-index: 50; }
    .nav-item { display: flex; flex-direction: column; align-items: center; color: rgba(255,255,240,0.6); font-size: 0.75rem; text-decoration: none; }
    .nav-item.active { color: #ffb0d9; }
    .nav-item i { font-size: 1.6rem; margin-bottom: 2px; }
    .masonry { column-count: 2; column-gap: 12px; }
    .masonry-item { break-inside: avoid; margin-bottom: 12px; }
  </style>
</head>
<body class="text-white pb-20">

<div class="container mx-auto px-4 pt-6 max-w-2xl">
  <div class="flex items-center gap-3 mb-4">
    <img src="https://jbwmyqvlujytnjpgsqed.supabase.co/storage/v1/object/public/others/f0ba2146b733756d-removebg-preview.png" alt="Logo" class="w-10 h-10 rounded-full object-cover">
    <h1 class="text-3xl font-extrabold tracking-wide">👔 孙老师穿搭</h1>
  </div>
  <button id="show-form-btn" class="glass px-4 py-2 rounded-full text-sm flex items-center gap-2"><i class="fa fa-camera"></i> 记录今日穿搭</button>

  <div id="publish-form" class="glass rounded-3xl p-5 mb-6 hidden">
    <h2 class="text-lg font-semibold mb-4">记录孙老师的穿搭</h2>
    <div class="space-y-4">
      <input type="date" id="outfit-date" class="w-full p-3 rounded-2xl bg-black/30 border border-white/20 text-white" value="">
      <textarea id="outfit-desc" placeholder="描述孙老师今天穿了什么… (必填)" class="w-full p-3 rounded-2xl bg-black/30 border border-white/20 text-white" rows="2"></textarea>
      <div class="relative">
        <input type="text" id="outfit-tags" placeholder="风格标签 (用逗号分隔，如：休闲,复古)" class="w-full p-3 rounded-2xl bg-black/30 border border-white/20 text-white">
      </div>
      <div id="outfit-image-area" class="border-2 border-dashed border-white/30 rounded-2xl p-4 text-center cursor-pointer hover:border-pink-400 transition">
        <input type="file" id="outfit-image-input" accept="image/*" class="hidden">
        <i class="fa fa-camera text-2xl text-white/50"></i>
        <p class="text-sm text-white/60 mt-1" id="image-preview-text">点击上传穿搭照片 (必填)</p>
        <img id="outfit-image-preview" class="max-h-32 mx-auto mt-2 hidden rounded-xl">
      </div>
      <div class="flex gap-3">
        <button id="cancel-outfit" class="flex-1 py-3 bg-white/10 rounded-2xl">取消</button>
        <button id="submit-outfit" class="flex-1 py-3 gradient-bg rounded-2xl font-bold">发布</button>
      </div>
      <p id="outfit-upload-status" class="text-xs text-center text-white/50"></p>
    </div>
  </div>

  <div id="outfits-container" class="masonry"></div>
  <div id="loading-more" class="text-center py-4 text-white/50">加载中…</div>
</div>

<div class="bottom-nav">
  <a href="home.html" class="nav-item"><i class="fa fa-home"></i><span>首页</span></a>
  <a href="overtime.html" class="nav-item"><i class="fa fa-clock-o"></i><span>拖堂</span></a>
  <a href="court.html" class="nav-item"><i class="fa fa-gavel"></i><span>审判</span></a>
  <a href="forum.html" class="nav-item"><i class="fa fa-comments"></i><span>论坛</span></a>
  <a href="profile.html" class="nav-item"><i class="fa fa-user"></i><span>我的</span></a>
</div>

<script>
  (function() {
    const SUPABASE_URL = 'https://jbwmyqvlujytnjpgsqed.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_RSF_RRme6hI32KQqXBtWlA_httMuqbe';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const BUCKET_NAME = 'outfits';
    let user = null;
    supabase.auth.getUser().then(({ data }) => { user = data.user; updateUIBasedOnAuth(); });
    document.getElementById('outfit-date').value = new Date().toISOString().split('T')[0];

    function updateUIBasedOnAuth() { const btn = document.getElementById('show-form-btn'); if (!user) { btn.innerHTML = '<i class="fa fa-lock"></i> 登录后记录'; btn.classList.add('opacity-60'); btn.onclick = () => alert('请先登录'); } else { btn.onclick = () => document.getElementById('publish-form').classList.remove('hidden'); } }

    async function loadOutfits() {
      const container = document.getElementById('outfits-container');
      const loadingEl = document.getElementById('loading-more');
      const { data, error } = await supabase.from('outfit_records').select('*').eq('status', 'approved').order('date', { ascending: false }).limit(50);
      loadingEl.style.display = 'none';
      if (error) { container.innerHTML = '<p class="text-center text-red-300">加载失败</p>'; return; }
      if (!data || data.length === 0) { container.innerHTML = '<p class="text-center text-white/50 py-8">还没有孙老师的穿搭记录</p>'; return; }
      const userIds = [...new Set(data.map(item => item.user_id).filter(Boolean))];
      let nickMap = {};
      if (userIds.length > 0) { const { data: profilesData } = await supabase.from('profiles').select('id, nickname').in('id', userIds); profilesData?.forEach(p => { nickMap[p.id] = p.nickname || '小志志_未知'; }); }
      container.innerHTML = data.map(item => `
        <div class="masonry-item glass rounded-2xl overflow-hidden">
          ${item.image_url ? `<img src="${item.image_url}" class="w-full object-cover" onerror="this.style.display='none'">` : ''}
          <div class="p-4">
            <div class="text-xs text-pink-300 mb-1">📅 ${item.date} · ${escapeHtml(nickMap[item.user_id] || '小志志_未知')}</div>
            <p class="text-white/90 mb-2">${escapeHtml(item.description || '无描述')}</p>
            ${item.style_tags && item.style_tags.length ? `<div class="flex flex-wrap gap-1">${item.style_tags.map(t => `<span class="text-xs bg-pink-500/30 px-2 py-0.5 rounded-full">#${escapeHtml(t)}</span>`).join('')}</div>` : ''}
            <button onclick="shareItem('outfit',${item.id})" class="text-xs text-pink-300 mt-2"><i class="fa fa-share-alt"></i> 分享</button>
          </div>
        </div>`).join('');
    }

    // ---------- 发布（含违禁词检测） ----------
    document.getElementById('submit-outfit').onclick = async () => {
      if (!user) return alert('请先登录');
      const date = document.getElementById('outfit-date').value;
      const desc = document.getElementById('outfit-desc').value.trim();
      if (!desc || !selectedImageFile) return alert('请填写描述并上传照片');
      const tags = document.getElementById('outfit-tags').value.split(',').map(s => s.trim()).filter(s => s);
      const statusEl = document.getElementById('outfit-upload-status');
      const submitBtn = document.getElementById('submit-outfit');

      // 违禁词检测
      const fullText = desc + ' ' + tags.join(' ');
      if (await checkAndHandleViolation(supabase, user, fullText, 'outfit')) {
        statusEl.textContent = '内容含有违禁词，已被阻止';
        return;
      }

      submitBtn.disabled = true;
      const { data: { session } } = await supabase.auth.getSession();
      const accessToken = session?.access_token;
      if (!accessToken) { alert('登录过期'); window.location.href = 'auth.html'; return; }
      statusEl.textContent = '上传图片中...';
      const fileName = `${Date.now()}_${Math.random().toString(36).substring(2,8)}.${selectedImageFile.name.split('.').pop()}`;
      let imageUrl = null;
      try {
        await new Promise((resolve, reject) => {
          const upload = new tus.Upload(selectedImageFile, {
            endpoint: `${SUPABASE_URL}/storage/v1/upload/resumable`,
            headers: { authorization: `Bearer ${accessToken}`, 'x-upsert': 'true' },
            metadata: { bucketName: BUCKET_NAME, objectName: fileName, contentType: selectedImageFile.type },
            onError: reject, onSuccess: () => { imageUrl = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET_NAME}/${fileName}`; resolve(); }
          }); upload.start();
        });
      } catch (e) { alert('图片上传失败'); submitBtn.disabled = false; return; }

      statusEl.textContent = '发布中...';
      const { data: profileData } = await supabase.from('profiles').select('nickname').eq('id', user.id).single();
      const nickname = profileData?.nickname || '小志志_未知';
      const { error } = await supabase.from('outfit_records').insert({ user_id: user.id, date, description: desc, image_url: imageUrl, style_tags: tags, nickname });
      if (error) alert('发布失败: ' + error.message);
      else { alert('记录成功！'); document.getElementById('publish-form').classList.add('hidden'); resetForm(); loadOutfits(); }
      submitBtn.disabled = false; statusEl.textContent = '';
    };

    // 图片选择、重置等函数与之前相同，此处省略以节省篇幅，实际使用时保留
    // （以下是简化版，完整版请使用之前提供的 outfits.html 中的相关代码）
    let selectedImageFile = null;
    const imageInput = document.getElementById('outfit-image-input');
    const imagePreview = document.getElementById('outfit-image-preview');
    const previewText = document.getElementById('image-preview-text');
    document.getElementById('outfit-image-area').onclick = () => imageInput.click();
    imageInput.onchange = (e) => { if (e.target.files[0]) { selectedImageFile = e.target.files[0]; previewText.textContent = selectedImageFile.name; const reader = new FileReader(); reader.onload = (ev) => { imagePreview.src = ev.target.result; imagePreview.classList.remove('hidden'); }; reader.readAsDataURL(selectedImageFile); } };
    document.getElementById('cancel-outfit').onclick = () => { document.getElementById('publish-form').classList.add('hidden'); resetForm(); };
    function resetForm() { document.getElementById('outfit-date').value = new Date().toISOString().split('T')[0]; document.getElementById('outfit-desc').value = ''; document.getElementById('outfit-tags').value = ''; imageInput.value = ''; selectedImageFile = null; imagePreview.classList.add('hidden'); previewText.textContent = '点击上传穿搭照片 (必填)'; document.getElementById('outfit-upload-status').textContent = ''; }

    loadOutfits();
  })();
</script>
</body>
</html>
