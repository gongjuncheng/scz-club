<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>孙春志官方后援会 · 首页</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <style>
    body { background:#0b0710; font-family:'PingFang SC','Microsoft YaHei',sans-serif; margin:0; }
    .glass { background:rgba(255,255,255,0.08); backdrop-filter:blur(15px); border:1px solid rgba(255,200,240,0.15); border-radius:24px; }
    .gradient-bg { background:linear-gradient(135deg,#d43f8d,#6a1b4d); }
    .bottom-nav { position:fixed; bottom:0; left:0; width:100%; background:rgba(20,10,30,0.7); backdrop-filter:blur(20px); border-top:1px solid rgba(255,255,255,0.1); padding:10px 24px; display:flex; justify-content:space-around; z-index:50; }
    .nav-item { display:flex; flex-direction:column; align-items:center; color:rgba(255,255,240,0.6); font-size:0.75rem; text-decoration:none; }
    .nav-item.active { color:#ffb0d9; }
    .nav-item i { font-size:1.6rem; margin-bottom:2px; }
  </style>
</head>
<body class="text-white pb-20">

  <header class="px-5 pt-8 pb-4">
    <div class="flex items-center gap-3">
      <img src="https://jbwmyqvlujytnjpgsqed.supabase.co/storage/v1/object/public/others/f0ba2146b733756d-removebg-preview.png" alt="Logo" class="w-12 h-12 rounded-full object-cover shadow-lg">
      <h1 class="text-[clamp(1.5rem,5vw,1.8rem)] font-bold" style="text-shadow:0 0 15px #ffb0d9;">孙春志官方后援会</h1>
    </div>
  </header>

  <main class="px-5 space-y-6">
    <section class="grid grid-cols-3 gap-3">
      <a href="overtime.html" class="glass rounded-2xl p-4 flex flex-col items-center gap-2 text-center"><i class="fa fa-clock-o text-xl"></i><span class="text-sm">拖堂记录</span></a>
      <a href="outfits.html" class="glass rounded-2xl p-4 flex flex-col items-center gap-2 text-center"><i class="fa fa-tshirt text-xl"></i><span class="text-sm">穿搭秘籍</span></a>
      <a href="goodies.html" class="glass rounded-2xl p-4 flex flex-col items-center gap-2 text-center"><i class="fa fa-gift text-xl"></i><span class="text-sm">好物分享</span></a>
      <a href="memes.html" class="glass rounded-2xl p-4 flex flex-col items-center gap-2 text-center"><i class="fa fa-smile-o text-xl"></i><span class="text-sm">表情包</span></a>
      <a href="forum.html" class="glass rounded-2xl p-4 flex flex-col items-center gap-2 text-center"><i class="fa fa-comments text-xl"></i><span class="text-sm">论坛</span></a>
      <a href="court.html" class="glass rounded-2xl p-4 flex flex-col items-center gap-2 text-center"><i class="fa fa-gavel text-xl"></i><span class="text-sm">审判</span></a>
    </section>

    <section class="glass rounded-2xl p-5">
      <div class="flex items-center justify-between"><h2 class="text-lg font-semibold">今日拖堂</h2><span class="text-xs px-3 py-1 bg-white/20 rounded-full">实时</span></div>
      <div id="today-overtime" class="mt-3 text-xl font-bold">加载中...</div>
      <p class="text-white/70 text-sm mt-1">每一次拖堂，都是知识的馈赠 💜</p>
    </section>

    <section>
      <h2 class="text-lg font-semibold mb-3">最新穿搭</h2>
      <div id="outfit-grid" class="grid grid-cols-2 gap-3"><div class="col-span-2 text-center py-6 text-white/60">加载中…</div></div>
    </section>
  </main>

  <div class="bottom-nav">
    <a href="home.html" class="nav-item active"><i class="fa fa-home"></i><span>首页</span></a>
    <a href="overtime.html" class="nav-item"><i class="fa fa-clock-o"></i><span>拖堂</span></a>
    <a href="court.html" class="nav-item"><i class="fa fa-gavel"></i><span>审判</span></a>
    <a href="forum.html" class="nav-item"><i class="fa fa-comments"></i><span>论坛</span></a>
    <a href="profile.html" class="nav-item"><i class="fa fa-user"></i><span>我的</span></a>
  </div>

  <script>
    (function(){
      const SUPABASE_URL='https://jbwmyqvlujytnjpgsqed.supabase.co';
      const SUPABASE_ANON_KEY='sb_publishable_RSF_RRme6hI32KQqXBtWlA_httMuqbe';
      const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
      function escapeHtml(text){ return String(text).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[c]); }
      async function loadTodayOvertime(){
        const today=new Date().toISOString().split('T')[0];
        const container=document.getElementById('today-overtime');
        const {data,error}=await supabase.from('overtime_records').select('seconds').eq('date',today).eq('status','approved');
        if(error||!data){ container.textContent='数据加载失败'; return; }
        const total=data.reduce((s,r)=>s+(r.seconds||0),0);
        container.textContent=total>0?`孙老师今日已拖堂 ${total} 秒`:'孙老师今日准时下课 ✨';
      }
      async function loadLatestOutfits(){
        const grid=document.getElementById('outfit-grid');
        const {data,error}=await supabase.from('outfit_records').select('image_url,user_id').eq('status','approved').order('created_at',{ascending:false}).limit(4);
        if(error||!data||data.length===0){ grid.innerHTML='<div class="glass rounded-2xl overflow-hidden aspect-[3/4]"><img src="https://picsum.photos/seed/ccs1/600/800" class="w-full h-full object-cover"></div><div class="glass rounded-2xl overflow-hidden aspect-[3/4]"><img src="https://picsum.photos/seed/ccs2/600/800" class="w-full h-full object-cover"></div>'; return; }
        const userIds=[...new Set(data.map(i=>i.user_id).filter(Boolean))];
        let nickMap={};
        if(userIds.length>0){
          const {data:profilesData}=await supabase.from('profiles').select('id,nickname').in('id',userIds);
          profilesData?.forEach(p=>{nickMap[p.id]=p.nickname||'小志志_未知';});
        }
        grid.innerHTML=data.map(item=>`
          <div class="glass rounded-2xl overflow-hidden aspect-[3/4]">
            <img src="${item.image_url}" alt="穿搭" class="w-full h-full object-cover" onerror="this.src='https://picsum.photos/seed/fallback/400/600'">
            <div class="p-2 text-xs text-white/70">${escapeHtml(nickMap[item.user_id]||'小志志_未知')}</div>
          </div>`).join('');
      }
      loadTodayOvertime();
      loadLatestOutfits();
    })();
  </script>
</body>
</html>
