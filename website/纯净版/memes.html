<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>表情包 · 孙春志后援会</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/tus-js-client@3.1.3/dist/tus.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <script src="common.js"></script>
  <style>
    body { background: #0b0710; font-family: 'PingFang SC', sans-serif; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); border: 1px solid rgba(255,200,240,0.15); }
    .gradient-bg { background: linear-gradient(135deg, #d43f8d, #6a1b4d); }
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(20,10,30,0.7); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); padding: 10px 24px; display: flex; justify-content: space-around; z-index: 50; }
    .nav-item { display: flex; flex-direction: column; align-items: center; color: rgba(255,255,240,0.6); font-size: 0.75rem; text-decoration: none; }
    .nav-item.active { color: #ffb0d9; }
    .nav-item i { font-size: 1.6rem; margin-bottom: 2px; }
    .meme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .meme-card { aspect-ratio: 1/1; overflow: hidden; border-radius: 16px; cursor: pointer; }
    .meme-card img { width: 100%; height: 100%; object-fit: cover; }
    .preview-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; padding: 16px; }
    .preview-content { max-width: 90vw; max-height: 90vh; position: relative; }
    .preview-content img { max-width: 100%; max-height: 80vh; border-radius: 24px; }
    .close-preview { position: absolute; top: -40px; right: 0; color: white; font-size: 2rem; cursor: pointer; }
    .tag { display: inline-block; background: rgba(212,63,141,0.3); padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; margin-right: 4px; }
  </style>
</head>
<body class="text-white pb-20">

<div class="container mx-auto px-4 pt-6 max-w-2xl">
  <div class="flex items-center gap-3 mb-4">
    <img src="https://jbwmyqvlujytnjpgsqed.supabase.co/storage/v1/object/public/others/f0ba2146b733756d-removebg-preview.png" alt="Logo" class="w-10 h-10 rounded-full object-cover">
    <h1 class="text-3xl font-extrabold tracking-wide">😎 孙老师表情包</h1>
  </div>
  <button id="show-form-btn" class="glass px-4 py-2 rounded-full text-sm flex items-center gap-2"><i class="fa fa-plus"></i> 上传表情包</button>

  <div id="publish-form" class="glass rounded-3xl p-5 mb-6 hidden">
    <h2 class="text-lg font-semibold mb-4">上传孙老师表情包</h2>
    <div class="space-y-4">
      <input type="text" id="meme-title" placeholder="表情包标题 (选填)" class="w-full p-3 rounded-2xl bg-black/30 border border-white/20 text-white">
      <div id="meme-image-area" class="border-2 border-dashed border-white/30 rounded-2xl p-4 text-center cursor-pointer hover:border-pink-400 transition">
        <input type="file" id="meme-image-input" accept="image/*,image/gif" class="hidden">
        <i class="fa fa-smile-o text-2xl text-white/50"></i>
        <p class="text-sm text-white/60 mt-1" id="meme-preview-text">点击上传表情包 (必填，支持GIF)</p>
        <img id="meme-image-preview" class="max-h-32 mx-auto mt-2 hidden rounded-xl">
      </div>
      <input type="text" id="meme-tags" placeholder="标签 (用逗号分隔，如：搞笑,生物课)" class="w-full p-3 rounded-2xl bg-black/30 border border-white/20 text-white">
      <div class="flex gap-3"><button id="cancel-meme" class="flex-1 py-3 bg-white/10 rounded-2xl">取消</button><button id="submit-meme" class="flex-1 py-3 gradient-bg rounded-2xl font-bold">上传</button></div>
      <p id="meme-status" class="text-xs text-center text-white/50"></p>
    </div>
  </div>

  <div id="memes-grid" class="meme-grid"></div>
  <div id="loading-more" class="text-center py-4 text-white/50">加载中…</div>
</div>

<div id="preview-modal" class="preview-modal">
  <div class="preview-content">
    <span class="close-preview" onclick="document.getElementById('preview-modal').style.display='none'">&times;</span>
    <img id="preview-image" src="" alt="表情包预览">
    <p id="preview-title" class="text-center mt-3 text-white/90"></p>
    <div id="preview-tags" class="flex flex-wrap justify-center gap-1 mt-2"></div>
  </div>
</div>

<div class="bottom-nav">
  <a href="home.html" class="nav-item"><i class="fa fa-home"></i><span>首页</span></a>
  <a href="overtime.html" class="nav-item"><i class="fa fa-clock-o"></i><span>拖堂</span></a>
  <a href="court.html" class="nav-item"><i class="fa fa-gavel"></i><span>审判</span></a>
  <a href="forum.html" class="nav-item"><i class="fa fa-comments"></i><span>论坛</span></a>
  <a href="profile.html" class="nav-item"><i class="fa fa-user"></i><span>我的</span></a>
</div>

<script>
  (function() {
    const SUPABASE_URL = 'https://jbwmyqvlujytnjpgsqed.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_RSF_RRme6hI32KQqXBtWlA_httMuqbe';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const BUCKET_NAME = 'memes';
    let user = null;
    supabase.auth.getUser().then(({ data }) => { user = data.user; updateUIBasedOnAuth(); });
    function updateUIBasedOnAuth() { const btn = document.getElementById('show-form-btn'); if (!user) { btn.innerHTML = '<i class="fa fa-lock"></i> 登录后上传'; btn.classList.add('opacity-60'); btn.onclick = () => alert('请先登录'); } else { btn.onclick = () => document.getElementById('publish-form').classList.remove('hidden'); } }

    async function loadMemes() {
      const grid = document.getElementById('memes-grid');
      const loading = document.getElementById('loading-more');
      const { data, error } = await supabase.from('memes').select('*').eq('status', 'approved').order('created_at', { ascending: false }).limit(100);
      loading.style.display = 'none';
      if (error) { grid.innerHTML = '<p class="col-span-3 text-center text-red-300">加载失败</p>'; return; }
      if (!data || data.length === 0) { grid.innerHTML = '<p class="col-span-3 text-center text-white/50 py-8">还没有表情包</p>'; return; }
      const userIds = [...new Set(data.map(item => item.user_id).filter(Boolean))];
      let nickMap = {};
      if (userIds.length > 0) { const { data: profilesData } = await supabase.from('profiles').select('id, nickname').in('id', userIds); profilesData?.forEach(p => { nickMap[p.id] = p.nickname || '小志志_未知'; }); }
      grid.innerHTML = data.map(item => `
        <div class="meme-card glass" data-url="${item.image_url}" data-title="${escapeHtml(item.title || '')}" data-tags="${(item.tags || []).join(',')}">
          <img src="${item.image_url}" alt="${escapeHtml(item.title || '表情包')}" loading="lazy">
          <div class="text-xs text-white/60 p-1 flex justify-between items-center">
            <span>${escapeHtml(nickMap[item.user_id] || '小志志_未知')}</span>
            <button onclick="event.stopPropagation();shareItem('meme',${item.id})" class="text-pink-300"><i class="fa fa-share-alt"></i></button>
          </div>
        </div>`).join('');

      // 事件委托绑定预览
      grid.addEventListener('click', (e) => {
        const card = e.target.closest('.meme-card');
        if (!card) return;
        const url = card.dataset.url;
        const title = card.dataset.title;
        const tags = card.dataset.tags ? card.dataset.tags.split(',') : [];
        document.getElementById('preview-image').src = url;
        document.getElementById('preview-title').textContent = title || '';
        document.getElementById('preview-tags').innerHTML = tags.map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join('');
        document.getElementById('preview-modal').style.display = 'flex';
      });
    }

    // ---------- 上传（含违禁词检测） ----------
    document.getElementById('submit-meme').onclick = async () => {
      if (!user || !selectedImageFile) return alert('请先登录并选择图片');
      const title = document.getElementById('meme-title').value.trim();
      const tags = document.getElementById('meme-tags').value.split(',').map(s => s.trim()).filter(s => s);
      const statusEl = document.getElementById('meme-status');
      const submitBtn = document.getElementById('submit-meme');

      const checkText = (title || '') + ' ' + tags.join(' ');
      if (await checkAndHandleViolation(supabase, user, checkText, 'meme')) {
        statusEl.textContent = '内容含有违禁词，已被阻止';
        return;
      }

      submitBtn.disabled = true;
      const { data: { session } } = await supabase.auth.getSession();
      const accessToken = session?.access_token;
      if (!accessToken) { alert('登录过期'); window.location.href = 'auth.html'; return; }
      statusEl.textContent = '上传中...';
      const ext = selectedImageFile.name.split('.').pop();
      const fileName = `${Date.now()}_${Math.random().toString(36).substring(2,8)}.${ext}`;
      let imageUrl = null;
      try {
        await new Promise((resolve, reject) => {
          const upload = new tus.Upload(selectedImageFile, {
            endpoint: `${SUPABASE_URL}/storage/v1/upload/resumable`,
            headers: { authorization: `Bearer ${accessToken}`, 'x-upsert': 'true' },
            metadata: { bucketName: BUCKET_NAME, objectName: fileName, contentType: selectedImageFile.type },
            onError: reject, onSuccess: () => { imageUrl = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET_NAME}/${fileName}`; resolve(); }
          }); upload.start();
        });
      } catch (e) { alert('图片上传失败'); submitBtn.disabled = false; return; }
      const { error } = await supabase.from('memes').insert({ user_id: user.id, title: title || null, image_url: imageUrl, tags });
      if (error) alert('保存失败: ' + error.message);
      else { alert('上传成功！'); document.getElementById('publish-form').classList.add('hidden'); resetForm(); loadMemes(); }
      submitBtn.disabled = false; statusEl.textContent = '';
    };

    let selectedImageFile = null;
    const imageInput = document.getElementById('meme-image-input');
    const preview = document.getElementById('meme-image-preview');
    const previewText = document.getElementById('meme-preview-text');
    document.getElementById('meme-image-area').onclick = () => imageInput.click();
    imageInput.onchange = (e) => { if (e.target.files[0]) { selectedImageFile = e.target.files[0]; previewText.textContent = selectedImageFile.name; const reader = new FileReader(); reader.onload = (ev) => { preview.src = ev.target.result; preview.classList.remove('hidden'); }; reader.readAsDataURL(selectedImageFile); } };
    document.getElementById('cancel-meme').onclick = () => { document.getElementById('publish-form').classList.add('hidden'); resetForm(); };
    function resetForm() { document.getElementById('meme-title').value = ''; document.getElementById('meme-tags').value = ''; imageInput.value = ''; selectedImageFile = null; preview.classList.add('hidden'); previewText.textContent = '点击上传表情包 (必填)'; document.getElementById('meme-status').textContent = ''; }

    loadMemes();
  })();
</script>
</body>
</html>
