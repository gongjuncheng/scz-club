<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>分享 · 孙春志后援会</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <script src="common.js"></script>
  <style>
    body { background:#0b0710; font-family:'PingFang SC','Microsoft YaHei',sans-serif; margin:0; color:#fff; }
    .glass { background:rgba(255,255,255,0.08); backdrop-filter:blur(15px); border:1px solid rgba(255,200,240,0.15); border-radius:24px; padding:20px; }
    .bottom-nav { position:fixed; bottom:0; left:0; width:100%; background:rgba(20,10,30,0.7); backdrop-filter:blur(20px); border-top:1px solid rgba(255,255,255,0.1); padding:10px 24px; display:flex; justify-content:space-around; z-index:50; }
    .nav-item { display:flex; flex-direction:column; align-items:center; color:rgba(255,255,240,0.6); font-size:0.75rem; text-decoration:none; }
    .nav-item i { font-size:1.6rem; margin-bottom:2px; }
  </style>
</head>
<body class="text-white pb-20">
<div class="container mx-auto px-4 pt-6 max-w-2xl">
  <h1 class="text-3xl font-bold mb-6">📌 分享内容</h1>
  <div id="share-content" class="glass">加载中…</div>
</div>

<div class="bottom-nav">
  <a href="home.html" class="nav-item"><i class="fa fa-home"></i><span>首页</span></a>
  <a href="overtime.html" class="nav-item"><i class="fa fa-clock-o"></i><span>拖堂</span></a>
  <a href="court.html" class="nav-item"><i class="fa fa-gavel"></i><span>审判</span></a>
  <a href="forum.html" class="nav-item"><i class="fa fa-comments"></i><span>论坛</span></a>
  <a href="profile.html" class="nav-item"><i class="fa fa-user"></i><span>我的</span></a>
</div>

<script>
  (function() {
    const SUPABASE_URL = 'https://jbwmyqvlujytnjpgsqed.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_RSF_RRme6hI32KQqXBtWlA_httMuqbe';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const type = params.get('type');
    let id = params.get('id');
    const container = document.getElementById('share-content');

    async function loadContent() {
      if (!type || !id) {
        container.innerHTML = '<p class="text-red-400">缺少分享参数</p>';
        return;
      }

      let table, column;
      switch(type) {
        case 'goodie': table='goodies'; column='id'; break;
        case 'meme': table='memes'; column='id'; break;
        case 'post': table='posts'; column='id'; break;
        case 'case': table='indictments'; column='case_id'; break;
        case 'outfit': table='outfit_records'; column='id'; break;
        default: container.innerHTML='<p class="text-red-400">未知分享类型</p>'; return;
      }

      // 数字类型的 id 需要转换为整数（除了 case 是字符串）
      if (type !== 'case') {
        const numId = parseInt(id, 10);
        if (isNaN(numId)) {
          container.innerHTML = '<p class="text-red-400">无效的分享ID</p>';
          return;
        }
        id = numId;
      }

      const { data, error } = await supabase.from(table).select('*').eq(column, id).single();
      if (error || !data) { container.innerHTML = '<p class="text-red-400">内容不存在或已删除</p>'; return; }

      let html = '';
      if (type === 'goodie') {
        html = `<div class="text-center">
          <img src="${data.image_url}" class="rounded-2xl max-h-64 mx-auto mb-4" onerror="this.style.display='none'">
          <h2 class="text-2xl font-bold text-pink-300">${escapeHtml(data.name)}</h2>
          <p class="text-white/70 mt-2">${escapeHtml(data.description)}</p>
          <span class="inline-block bg-pink-500/30 text-xs px-3 py-1 rounded-full mt-2">${escapeHtml(data.category||'其他')}</span>
          <p class="text-white/40 text-xs mt-4">${new Date(data.created_at).toLocaleDateString()}</p>
        </div>`;
      } else if (type === 'meme') {
        html = `<div class="text-center">
          <img src="${data.image_url}" class="rounded-2xl max-h-64 mx-auto mb-4">
          <h2 class="text-xl font-bold text-pink-300">${escapeHtml(data.title||'无标题')}</h2>
          <div class="flex flex-wrap justify-center gap-1 mt-2">${(data.tags||[]).map(t=>`<span class="bg-pink-500/30 text-xs px-2 py-0.5 rounded-full">#${escapeHtml(t)}</span>`).join('')}</div>
          <p class="text-white/40 text-xs mt-4">${new Date(data.created_at).toLocaleDateString()}</p>
        </div>`;
      } else if (type === 'post') {
        html = `<div>
          <h2 class="text-xl font-bold text-pink-300 mb-2">${escapeHtml(data.nickname||'匿名')} 的帖子</h2>
          <p class="text-white/80 whitespace-pre-wrap">${escapeHtml(data.content)}</p>
          ${data.image_url?`<img src="${data.image_url}" class="rounded-2xl max-h-64 mt-4">`:''}
          <p class="text-white/40 text-xs mt-4">${new Date(data.created_at).toLocaleString()}</p>
        </div>`;
      } else if (type === 'case') {
        const statusMap = {pending:'待受理',accepted:'审理中',rejected:'已驳回',closed:'已结案'};
        html = `<div>
          <h2 class="text-xl font-bold text-pink-300 mb-2">案件 ${escapeHtml(data.case_id)}</h2>
          <p class="text-white/70"><strong>原告：</strong>${escapeHtml(data.plaintiff_name)}</p>
          <p class="text-white/70"><strong>罪名：</strong>${escapeHtml(data.charge)}</p>
          <p class="text-white/70"><strong>状态：</strong>${statusMap[data.status]||data.status}</p>
          <p class="text-white/70 mt-2">${escapeHtml(data.details)}</p>
          ${data.indictment_pdf_url?`<a href="${data.indictment_pdf_url}" target="_blank" class="text-pink-300 underline text-sm">查看起诉状PDF</a>`:''}
        </div>`;
      } else if (type === 'outfit') {
        html = `<div class="text-center">
          <img src="${data.image_url}" class="rounded-2xl max-h-64 mx-auto mb-4" onerror="this.style.display='none'">
          <p class="text-white/80 mt-2">${escapeHtml(data.description || '无描述')}</p>
          <div class="flex flex-wrap justify-center gap-1 mt-2">${(data.style_tags || []).map(t => `<span class="bg-pink-500/30 text-xs px-2 py-0.5 rounded-full">#${escapeHtml(t)}</span>`).join('')}</div>
          <p class="text-white/40 text-xs mt-4">📅 ${data.date} · ${new Date(data.created_at).toLocaleDateString()}</p>
        </div>`;
      }

      container.innerHTML = html;
    }

    loadContent();
  })();
</script>
</body>
</html>
